<!DOCTYPE html> <!-- Document type declaration -->

<html lang="en"> <!-- HTML document root with language set to English -->

<head> <!-- Head section containing metadata and styles -->

  <!-- Meta tags for character set and viewport -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title of the document -->
  <title>Bus Ticket Booking</title>

  <!-- Internal CSS styles -->
  <style>
    /* General styles for the body */
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    /* Styles for the container */
    .container {
      max-width: 600px;
      height: 350px;
      margin: 50px auto;
      /* Centering the container horizontally */
      background-color: gray;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      margin-top: 130px;
      /* Adjusting top margin */
      box-shadow: 0px 0px 31px black;
      /* Adding a shadow effect */
    }

    /* Styles for headings */
    h1 {
      text-align: center;
    }

    /* Styles for labels */
    label {
      display: block;
      margin-bottom: 10px;
      font-size: 36px;
      font-weight: 600;
    }

    /* Styles for input fields */
    input[type="number"] {
      width: 100%;
      height: 80px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 20px;
      font-size: 32px;
      font-weight: 300;
    }

    /* Styles for buttons */
    button {
      width: 100%;
      padding: 10px;
      background-color: aquamarine;
      color: #b20f0f;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 32px;
    }

    /* Button hover effect */
    button:hover {
      background-color: #0056b3;
      background: linear-gradient(#14ffe9, #ffeb3b, #ff6600);
    }

    /* Styles for ticket price display */
    #ticketPrice {
      text-align: center;
      font-size: 38px;
      margin-top: 20px;
      color: azure;
    }
  </style>

</head>

<body style="background-color:rgb(215, 215, 215);"> <!-- Body section -->

  <!-- Header -->
  <h1
    style="color: black; text-align: center; font-size: 65px; font-weight: 700; margin-top: 80px; font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-weight: 900;">
    TRAINS Ticket Booking</h1>

  <!-- Container for the ticket booking form -->
  <div class="container">
    <!-- Label for age input -->
    <label for="age"
      style="color: rgb(0, 0, 0); text-align: center; font-size: 43px; font-family: Verdana, Geneva, Tahoma, sans-serif;">Enter
      your age:</label>
    <!-- Input field for age -->
    <input type="number" id="age" min="1" required>
    <!-- Button to calculate ticket price -->
    <button onclick="calculateTicketPrice()">SEE YOUR Price</button>
    <!-- Paragraph to display ticket price -->
    <p id="ticketPrice"></p>
  </div>

  <!-- JavaScript section for ticket price calculation -->
  <script>
    function calculateTicketPrice() {
      // Getting the entered age
      var age = parseInt(document.getElementById('age').value);
      var ticketPrice = 1000; // Initial ticket price in INR

      // Checking if age is below 17 or above 70
      if (age < 17 || age > 70) {
        ticketPrice /= 2; // Halving ticket price for age below 17 or above 70
      }

      // Displaying the calculated ticket price
      document.getElementById('ticketPrice').innerText = 'Ticket Price: ₹' + ticketPrice.toFixed(2);
    }
  </script>

</body>

</html>
