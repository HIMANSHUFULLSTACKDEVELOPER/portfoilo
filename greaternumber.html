<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta tags for character set and viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title of the page -->
    <title>Which Number is Greater</title>
    <!-- Internal CSS styles -->
    <style>
        /* Styling for the body */

        body {
            background-image: url("https://tse4.mm.bing.net/th?id=OIP.c_JXwuJvpUkycsXNZACSTAHaE8&pid=Api&P=0&h=180");
            background-repeat: no-repeat;
            background-size: cover;
        }

        /* Styling for the container */
        .container {
            max-width: 600px;
            height: 600px;
            margin: 50px auto;
            background-color: rgba(195, 222, 135, 0);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0);
            margin-top: 150px;
            box-shadow: 0px 0px 32px rgba(24, 15, 15, 0.148);
        }

        /* Styling for the heading */
        h1 {
            text-align: center;
            font-size: 54px;
            font-weight: 600;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        /* Styling for the labels */
        label {
            display: block;
            margin-bottom: 10px;
            color: rgb(251, 139, 2);
            font-size: 32px;
        }

        /* Styling for the number input fields */
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ff0606;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 33px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        /* Styling for the results */
        #results {
            margin-top: 20px;
            font-size: 53px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <!-- Heading of the page -->
    <h1>Which Number is Greater</h1>
    <!-- Container for the input fields -->
    <div class="container">
        <!-- Label and input field for Number 1 -->
        <label for="number1">Number 1:</label>
        <input type="number" id="number1" oninput="compareNumbers()">
        <!-- Label and input field for Number 2 -->
        <label for="number2">Number 2:</label>
        <input type="number" id="number2" oninput="compareNumbers()">
        <!-- Label and input field for Number 3 -->
        <label for="number3">Number 3:</label>
        <input type="number" id="number3" oninput="compareNumbers()">
        <!-- Container for displaying the comparison results -->
        <div id="results"></div>
    </div>

    <!-- JavaScript code for comparing numbers -->
    <script>
        function compareNumbers() {
            // Retrieving values from input fields
            var number1 = parseInt(document.getElementById('number1').value);
            var number2 = parseInt(document.getElementById('number2').value);
            var number3 = parseInt(document.getElementById('number3').value);
            // Retrieving the results container
            var resultsDiv = document.getElementById('results');
            // Clearing previous results
            resultsDiv.innerHTML = '';

            // Checking if all inputs are numbers
            if (!isNaN(number1) && !isNaN(number2) && !isNaN(number3)) {
                // Comparing the numbers and displaying the result
                if (number1 > number2 && number1 > number3) {
                    resultsDiv.innerHTML += 'Number 1 is greater than Number 2 and Number 3.<br>';
                } else if (number2 > number1 && number2 > number3) {
                    resultsDiv.innerHTML += 'Number 2 is greater than Number 1 and Number 3.<br>';
                } else if (number3 > number1 && number3 > number2) {
                    resultsDiv.innerHTML += 'Number 3 is greater than Number 1 and Number 2.<br>';
                } else {
                    resultsDiv.innerHTML += 'Two or more numbers are equal.<br>';
                }
            }
        }
    </script>
</body>

</html>
