<!DOCTYPE html>
<html lang="en">

<head>
    <link href="./himanshupatil.jpg" rel="icon" />
    <style>
        .main-container {
            height: 80vh;
            width: 90dvw;
            display: flex;
            flex-direction: row;
            box-shadow: 0px 0px 27px brown;
        
        }

        .left-container {
            width: 60%;
            height: 100%;
     background-color: aqua;
            display: flex;
            flex-direction: column;
            border-radius: 30px;
        }

        .right-container {
            width: 20%;
            height: 100%;
            background-color: #1e1b42;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .score-board {
            width: 90%;
            height: 20%;
            background-color: rgb(13, 13, 13);
            margin: 40px;
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .display-container {
            width: 100%;
            height: 40%;
            background-color: #1b9393;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left-bottom__container {
            width: 90%;
            height: 50%;
            display: grid;
            grid-template-rows: 1fr 1fr;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .text-display {
            font-size: 40px;
            color: rgb(25, 12, 12);
            font-family: "Kode Mono", monospace;
            font-optical-sizing: auto;
            font-weight: bold;
            font-style: normal;
            padding: 40px;
        }

        .answer-button {
            width: 80%;
            border-radius: 20px;
            margin: 20px;
            background-color: #9ec8a7;
            font-size: 30px;
            color: white;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;

        }
    </style>
</head>

<body style="background-color: #9ec8a7;"  >
    <div style="margin: 0; margin-left: 300px;margin-top: 85px;margin-bottom: 35px;">
    <!-- display -->
    <div class="main-container" id="main-body">
        <div class="left-container" id="left-containerr">
            <div class="display-container" id="container">
                <h1 id="text-display" class="text-display">question</h1>
            </div>

            <!-- buttons -->
            <div class="left-bottom__container">
                <button class="answer-button" id="answer-one" onclick="answer(1)"></button>
                <button class="answer-button" id="answer-two" onclick="answer(2)"></button>
                <button class="answer-button" id="answer-three" onclick="answer(3)"></button>
                <button class="answer-button" id="answer-four" onclick="answer(4)"></button>
            </div>
        </div>
        <div class="right-container">
            <div class="score-board" id="container" style="background-color: #c27415">
                <h1 id="question-number" class="text-display">0</h1>
            </div>
            <div class="score-board" id="container" style="background-color: #ab0e84">
                <h1 id="score-one" class="text-display">0</h1>
            </div>
            <div class="score-board" id="container" style="background-color: #1a3fb9">
                <h1 id="score-two" class="text-display">0</h1>
            </div>
        </div>
    </div>
</div>
</body>

</html>
