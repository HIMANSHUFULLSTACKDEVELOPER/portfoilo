<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main-container {
            background-color: rgb(31, 148, 198);
            width: 70vw;
            margin-left: 20vw;
            height: 45vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-radius: 20px;
            box-shadow: 0px 0px 90px white;
            margin-top: 5px;
        }

        .input-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .display {
            background-color: whitesmoke;
            width: 90%;
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            margin-top: 45px;
            padding: 20px;
            margin-left: 30px;
        }

        .input-box {
            height: 44px;
            width: 80%;
            font-size: 22px;
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.701);
            border: none;
            border-radius: 20px;
        }

        .button {
            width: 80%;
            margin: 20px;
            height: 44px;
            background-color: navy;
            font-size: 22px;
            border: none;
            border-radius: 20px;
            color: white;
            box-shadow: 0px 0px 26px;
        }
    </style>
    <script>
        function displayText() {
            let x = document.getElementById("input").value;
            let output = "";
            let y = 1;
            while (y <= 15) {
                result = y * x;
                output = output + x + "*" + y + "=" + result;
                output = output + "<br>";
                y = y + 1;

            }
            document.getElementById("display").innerHTML = output;
        }
        function clearText() {
            document.getElementById("display").innerHTML = "";
        }
    </script>

</head>

<body style="background-color: rgb(108, 165, 42);">
    <h1
        style="font-size: 44px; font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif black; border: 3PX solid white;height: 70PX;width: 370PX; text-align: center; background-color: aquamarine; box-shadow: 0PX 0PX 21PX rgb(178, 108, 108); border-radius: 40PX; margin-left: 700px;">
        TABLES </h1> <br>

    <body style="margin: 0px">
        <div class="main-container">
            <div class="display" id="display"></div>
            <div class="input-container">
                <input id="input" type="number" class="input-box" />
                <button class="button" onmouseenter="displayText()">Tables</button>
                <button class="button" style="background-color: rgba(0, 0, 255, 0.505);" onmouseenter="clearText()">CLear
                    All</button>
            </div>
        </div>
    </body>

</html>

</body>

</html>
